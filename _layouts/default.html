<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Seguridad Informática</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --header-bg: #1e293b;
            --text-main: #f1f5f9;
            --accent-manuel: #38bdf8;
            --accent-juanjo: #4ade80;
            --accent-sergio: #fb923c;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column; /* Cambiado para permitir header arriba */
            min-height: 100vh;
        }

        /* --- CABECERA SUPERIOR --- */
        header {
            width: 100%;
            height: 80px;
            background-color: var(--header-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--accent-manuel), var(--accent-juanjo), var(--accent-sergio));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .wrapper {
            display: flex;
            flex-grow: 1;
        }

        /* --- MENÚ LATERAL --- */
        nav {
            width: 280px;
            background-color: rgba(15, 23, 42, 0.8);
            padding: 40px 20px;
            height: calc(100vh - 80px); /* Restamos el header */
            position: sticky;
            top: 80px;
            box-sizing: border-box;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        nav h2 {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 20px;
            padding-left: 10px;
        }

        .nav-link {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.02);
            transition: 0.3s;
        }

        .nav-link b { font-size: 0.9rem; margin-bottom: 2px; }
        .nav-link span { font-size: 0.7rem; opacity: 0.6; }

        .m-link { border-left: 3px solid var(--accent-manuel); color: var(--accent-manuel); }
        .j-link { border-left: 3px solid var(--accent-juanjo); color: var(--accent-juanjo); }
        .s-link { border-left: 3px solid var(--accent-sergio); color: var(--accent-sergio); }

        .nav-link:hover { transform: translateX(8px); background: rgba(255,255,255,0.05); }

        /* --- CONTENIDO --- */
        main {
            flex-grow: 1;
            padding: 50px;
            display: flex;
            justify-content: center;
        }

        .content-area {
            width: 100%;
            max-width: 850px;
            background: var(--bg-card);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 800px) {
            .wrapper { flex-direction: column; }
            nav { width: 100%; height: auto; position: relative; top: 0; }
            main { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Seguridad y Salud en el Trabajo Informático</h1>
    </header>

    <div class="wrapper">
        <nav>
            <h2>Índice de Secciones</h2>
            
            <a href="index.html" class="nav-link m-link">
                <b>Inicio</b>
                <span>Manuel</span>
            </a>

            <a href="riesgos-ergonomicos.html" class="nav-link m-link">
                <b>Riesgos Ergonómicos</b>
                <span>Manuel</span>
            </a>

            <a href="riesgos-psicosociales.html" class="nav-link j-link">
                <b>Riesgos Psicosociales</b>
                <span>Juan José</span>
            </a>

            <a href="prevencion.html" class="nav-link j-link">
                <b>Prevención Informática</b>
                <span>Juan José</span>
            </a>

            <a href="seguridad-fisica.html" class="nav-link s-link">
                <b>Seguridad Física</b>
                <span>Sergio</span>
            </a>

            <a href="riesgos-ambientales.html" class="nav-link s-link">
                <b>Riesgos Ambientales</b>
                <span>Sergio</span>
            </a>

            <a href="referencias.html" class="nav-link" style="border-left: 3px solid #94a3b8; color: #94a3b8;">
                <b>Referencias</b>
                <span>Equipo</span>
            </a>
        </nav>

        <main>
            <article class="content-area">
                {{ content }}
            </article>
        </main>
    </div>

</body>
</html>
