<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Seguridad Informática</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --header-bg: #1e293b;
            --text-main: #f1f5f9;
            --accent-manuel: #38bdf8;
            --accent-juanjo: #4ade80;
            --accent-sergio: #fb923c;
            --marca-red: #e20613; /* Color acento tipo prensa */
        }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- HEADER --- */
        header {
            width: 100%;
            height: 70px;
            background-color: var(--header-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 3px solid var(--marca-red);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .wrapper { display: flex; flex-grow: 1; }

        /* --- SIDEBAR --- */
        nav.sidebar {
            width: 260px;
            background-color: rgba(15, 23, 42, 0.95);
            padding: 20px;
            height: calc(100vh - 70px);
            position: sticky;
            top: 70px;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .nav-link {
            text-decoration: none;
            display: block;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            background: rgba(255,255,255,0.03);
            color: #cbd5e1;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-link:hover { background: var(--marca-red); color: white; }

        /* --- ÍNDICE ESTILO MARCA (HORIZONTAL) --- */
        .marca-index {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0 30px 0;
            padding: 10px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            overflow-x: auto; /* Por si hay muchos links en móvil */
            white-space: nowrap;
        }

        .marca-index span {
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.75rem;
            color: var(--marca-red);
            padding-right: 10px;
        }

        .marca-index ul {
            display: flex;
            list-style: none;
            padding: 0;
            margin: 0;
            gap: 8px;
        }

        .marca-index li a {
            text-decoration: none;
            color: var(--text-main);
            background: rgba(255,255,255,0.1);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .marca-index li a:hover {
            background: transparent;
            border-color: var(--marca-red);
            color: var(--marca-red);
        }

        /* --- CONTENIDO --- */
        main { flex-grow: 1; padding: 40px; display: flex; justify-content: center; }
        
        .content-area {
            width: 100%;
            max-width: 900px;
            background: var(--bg-card);
            padding: 40px;
            border-radius: 8px;
        }

        .page-title {
            font-size: 2.5rem;
            line-height: 1.1;
            font-weight: 800;
            margin: 0 0 10px 0;
        }

        @media (max-width: 800px) {
            .wrapper { flex-direction: column; }
            nav.sidebar { width: 100%; height: auto; position: relative; top: 0; }
        }
    </style>
</head>
<body>

    <header>
        <h1>SEGURIDAD <span style="color: var(--marca-red);">INFO</span></h1>
    </header>

    <div class="wrapper">
        <nav class="sidebar">
            <p style="font-size: 0.7rem; color: #64748b; font-weight: bold; text-transform: uppercase;">Menú Principal</p>
            <a href="index.html" class="nav-link">Inicio</a>
            <a href="riesgos-ergonomicos.html" class="nav-link">Ergonomía</a>
            <a href="riesgos-psicosociales.html" class="nav-link">Psicosociales</a>
            <a href="prevencion.html" class="nav-link">Prevención</a>
            <a href="seguridad-fisica.html" class="nav-link">Seguridad Física</a>
        </nav>

        <main>
            <article class="content-area">
                <h1 class="page-title">{{ page.title }}</h1>

                <div class="main-text">
                    {{ content }}
                </div>
            </article>
        </main>
    </div>

</body>
</html>
