<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Seguridad Informática</title>
    <style>
        /* --- VARIABLES Y TEMAS --- */
        :root {
            --bg-body: #0a0f14;
            --bg-nav: #111827;
            --text-main: #e2e8f0;
            --accent-manuel: #38bdf8; /* Celeste Tech */
            --accent-juanjo: #4ade80;  /* Verde Seguridad */
            --accent-sergio: #fb923c;  /* Naranja Alerta */
            --accent-ref: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* --- MENÚ LATERAL --- */
        nav {
            width: 300px;
            background-color: var(--bg-nav);
            height: 100vh;
            position: fixed;
            display: flex;
            flex-direction: column;
            padding: 40px 25px;
            box-sizing: border-box;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 100;
        }

        nav h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #64748b;
            margin-bottom: 30px;
            text-align: center;
        }

        /* --- ENLACES ESTILIZADOS --- */
        .nav-link {
            text-decoration: none;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
        }

        .nav-link span:first-child {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .nav-link span:last-child {
            font-size: 0.75rem;
            opacity: 0.6;
            text-transform: uppercase;
        }

        /* Colores por Autor */
        .link-manuel { border-left: 4px solid var(--accent-manuel); color: var(--accent-manuel); }
        .link-manuel:hover { background: rgba(56, 189, 248, 0.1); border-color: var(--accent-manuel); }

        .link-juanjo { border-left: 4px solid var(--accent-juanjo); color: var(--accent-juanjo); }
        .link-juanjo:hover { background: rgba(74, 222, 128, 0.1); border-color: var(--accent-juanjo); }

        .link-sergio { border-left: 4px solid var(--accent-sergio); color: var(--accent-sergio); }
        .link-sergio:hover { background: rgba(251, 146, 60, 0.1); border-color: var(--accent-sergio); }

        .link-ref { border-left: 4px solid var(--accent-ref); color: var(--accent-ref); }
        .link-ref:hover { background: rgba(148, 163, 184, 0.1); }

        /* --- CONTENIDO PRINCIPAL --- */
        main {
            margin-left: 300px;
            flex-grow: 1;
            padding: 60px;
            display: flex;
            justify-content: center;
        }

        .article-card {
            width: 100%;
            max-width: 800px;
            background: #1e293b;
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            line-height: 1.8;
        }

        /* Estilos Markdown dentro del card */
        .article-card h1 { font-size: 2.5rem; color: #fff; margin-top: 0; }
        .article-card h2 { color: var(--accent-manuel); border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .article-card p { color: #cbd5e1; font-size: 1.1rem; }
        
        /* Badge de Autor en el contenido */
        .author-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            body { flex-direction: column; }
            nav { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid #334155; }
            main { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <h2>Work-Safety JS</h2>
        
        <a href="index.html" class="nav-link link-manuel">
            <span>Inicio</span>
        </a>

        <a href="riesgos-ergonomicos.html" class="nav-link link-manuel">
            <span>Riesgos Ergonómicos</span>
        </a>

        <a href="riesgos-psicosociales.html" class="nav-link link-juanjo">
            <span>Riesgos Psicosociales</span>
        </a>

        <a href="prevencion-informatica.html" class="nav-link link-juanjo">
            <span>Prevención IT</span>
        </a>

        <a href="riesgos-ambientales.html" class="nav-link link-sergio">
            <span>Riesgos Ambientales</span>
        </a>

        <a href="seguridad-fisica.html" class="nav-link link-sergio">
            <span>Seguridad Física</span>
        </a>

        <a href="referencias.html" class="nav-link link-ref">
            <span>Referencias</span>
            <span>Equipo</span>
        </a>
    </nav>

    <main>
        <article class="article-card">
            {{ content }}
        </article>
    </main>

</body>
</html>
